services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_slice
      POSTGRES_USER: slice
      POSTGRES_PASSWORD: slice_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slice -d ai_slice"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
