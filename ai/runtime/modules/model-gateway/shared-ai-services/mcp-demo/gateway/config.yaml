# HTTP 网关配置 — 服务注册表 + 项目认证 + 配额
#
# services: 各 MCP 共享服务的 Streamable HTTP 地址
# projects: 业务项目的 API Key 和 Token 配额

services:
  llm-gateway:
    url: "http://127.0.0.1:9001/mcp"
  rag-service:
    url: "http://127.0.0.1:9002/mcp"
  memory-service:
    url: "http://127.0.0.1:9003/mcp"
  prompt-hub:
    url: "http://127.0.0.1:9004/mcp"

projects:
  customer-service:
    api_key: "${MCP_CUSTOMER_SERVICE_API_KEY}"
    quota:
      daily_tokens: 100000
  writing-assistant:
    api_key: "${MCP_WRITING_ASSISTANT_API_KEY}"
    quota:
      daily_tokens: 100000
