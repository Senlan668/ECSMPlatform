version: '3.8'

services:
  # PostgreSQL 数据库 (带 pgvector 扩展)
  db:
    image: pgvector/pgvector:pg17
    container_name: aiwxchat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_is_required}
      POSTGRES_DB: aiwxchat
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 后端 API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aiwxchat-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_is_required}@db:5432/aiwxchat
      WECHAT_DB_PATH: /data/wechat
      VOICE_FILE_PATH: /data/voice
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEBUG: "false"
      APP_ENV: prod
    volumes:
      - ./Msg/Msg:/data/wechat:ro
      - ./FileStorage/Voice:/data/voice:ro
      - ./scripts:/app/scripts:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aiwxchat-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
