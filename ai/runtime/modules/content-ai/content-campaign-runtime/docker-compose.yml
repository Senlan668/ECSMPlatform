services:
  # ============ PostgreSQL 数据库 ============
  postgres:
    image: postgres:16-alpine
    container_name: xhs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_is_required}
      POSTGRES_DB: langgraph_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ============ FastAPI 后端 ============
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xhs-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_is_required}@postgres:5432/langgraph_db
      POSTGRES_URI: postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD_is_required}@postgres:5432/langgraph_db
    env_file:
      - .env.production
    volumes:
      - ./static:/app/static
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 1G

  # ============ Nginx + 前端 ============
  nginx:
    build:
      context: .
      dockerfile: nginx.dockerfile
    container_name: xhs-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:80"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pgdata:
    driver: local
