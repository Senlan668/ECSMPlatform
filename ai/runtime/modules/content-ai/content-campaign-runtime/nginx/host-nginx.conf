# ============================================================
# 宿主机 Nginx 配置（总入口 :80）
# 部署路径: /etc/nginx/sites-available/api
# 用途: 将流量分发到 Docker Nginx (xhs) 和 ark-h5
# ============================================================

server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 20M;

    # ============== graph_xiaohongshu → Docker Nginx (:8080) ==============

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        expires 7d;
    }

    location /health {
        proxy_pass http://127.0.0.1:8080;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8080;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8080;
    }

    # ============== ark-h5 懂王 AI 智能助手 ==============

    # 后端 API
    location /ark-h5/api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location /ark-h5/debug/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /ark-h5/health {
        proxy_pass http://127.0.0.1:3001;
    }

    # 静态资源（头像等）
    location /ark-h5/static/ {
        alias /opt/ark-h5/backend/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Admin 管理后台
    location /ark-h5/admin/ {
        alias /opt/ark-h5/admin-frontend/dist/;
        index index.html;
        try_files $uri $uri/ /ark-h5/admin/index.html;
    }

    # 前端构建资产（长期缓存）
    location /ark-h5/assets/ {
        alias /opt/ark-h5/frontend/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # H5 前端 SPA
    location /ark-h5/ {
        alias /opt/ark-h5/frontend/dist/;
        index index.html;
        try_files $uri $uri/ /ark-h5/index.html;
    }

    # ============== 默认回退 → Docker Nginx (xhs 前端) ==============
    # 所有未匹配的路径都代理到 Docker Nginx，由其提供前端 SPA
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
